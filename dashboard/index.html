<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Institutional Research Summarizer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Investment Research Tool</p>
        <h1>機関投資家型リサーチサマリ</h1>
      </div>
      <div class="header-meta">
        <span id="asOfLabel">基準日: -</span>
        <span id="coverageLabel">カバレッジ: -</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel input-panel" aria-labelledby="input-title">
        <div class="panel-title">
          <h2 id="input-title">エビデンス入力</h2>
          <div class="actions">
            <button type="button" id="loadSampleButton">サンプル</button>
            <button type="button" id="formatButton">JSON整形</button>
            <button type="button" id="summarizeButton" class="primary">サマリ生成</button>
          </div>
        </div>
        <form id="evidenceForm" class="evidence-form">
          <div class="form-grid">
            <label>
              カテゴリ
              <select id="fieldCategory"></select>
            </label>
            <label>
              項目
              <input id="fieldItem" type="text" placeholder="例: 売上成長" />
            </label>
            <label>
              値
              <input id="fieldValue" type="text" placeholder="例: FY2025 +8.2%" />
            </label>
            <label>
              日付
              <input id="fieldDate" type="date" />
            </label>
            <label>
              確信度
              <select id="fieldConfidence">
                <option value="high">high</option>
                <option value="medium" selected>medium</option>
                <option value="low">low</option>
              </select>
            </label>
            <label>
              重要度
              <select id="fieldMateriality">
                <option value="high">high</option>
                <option value="medium" selected>medium</option>
                <option value="low">low</option>
              </select>
            </label>
            <label>
              方向
              <select id="fieldDirection">
                <option value="positive">positive</option>
                <option value="neutral" selected>neutral</option>
                <option value="negative">negative</option>
                <option value="mixed">mixed</option>
                <option value="unknown">unknown</option>
              </select>
            </label>
            <label>
              出所種別
              <select id="fieldSourceType">
                <option value="primary_filing">primary_filing</option>
                <option value="exchange">exchange</option>
                <option value="regulator">regulator</option>
                <option value="company_ir">company_ir</option>
                <option value="market_data">market_data</option>
                <option value="consensus">consensus</option>
                <option value="sell_side">sell_side</option>
                <option value="manual_model">manual_model</option>
                <option value="internal" selected>internal</option>
                <option value="unknown">unknown</option>
              </select>
            </label>
            <label>
              出所
              <input id="fieldSource" type="text" placeholder="例: FY2025 Form 10-K" />
            </label>
            <label>
              URL
              <input id="fieldSourceUrl" type="url" placeholder="https://..." />
            </label>
          </div>
          <label class="wide-field">
            解釈
            <textarea id="fieldInterpretation" rows="3" placeholder="投資判断上の意味、確認すべき反証条件など"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="primary">エビデンス追加</button>
            <button type="button" id="clearFormButton">入力クリア</button>
          </div>
        </form>
        <textarea id="jsonInput" spellcheck="false" aria-label="会社別エビデンスJSON"></textarea>
        <div class="file-row">
          <label class="file-control">
            <input type="file" id="fileInput" accept="application/json,.json" />
            JSONを開く
          </label>
          <button type="button" id="downloadButton">Markdown保存</button>
          <button type="button" id="copyButton">コピー</button>
        </div>
        <p id="errorBox" class="error" role="alert"></p>
      </section>

      <section class="panel summary-panel" aria-labelledby="summary-title">
        <div class="panel-title">
          <h2 id="summary-title">調査サマリ</h2>
          <div class="score" id="scoreBox">0</div>
        </div>
        <div id="auditStrip" class="audit-strip"></div>
        <div id="summaryOutput" class="summary-output"></div>
      </section>
    </main>

    <section class="catalog-section" aria-labelledby="catalog-title">
      <div class="catalog-header">
        <div>
          <p class="eyebrow">Information Map</p>
          <h2 id="catalog-title">機関投資家が確認する情報</h2>
        </div>
        <div class="legend">
          <span><i class="dot covered"></i>入力あり</span>
          <span><i class="dot missing"></i>未入力</span>
        </div>
      </div>
      <div id="catalogGrid" class="catalog-grid"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
